<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Links de download de mangás favoritos." />
  <link rel="icon" type="image/jpeg" href="assets/red x.jpg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-brand">
    <img src="assets/red x.jpg" alt="Mascote" style="height:48px;width:48px;object-fit:cover;border-radius:50%;filter:drop-shadow(0 0 8px rgba(233,69,96,0.7));" />
    <span>Anime</span>House
  </div>
  <ul class="navbar-links" id="navLinks">
    <li><a href="index.html"><span class="nav-icon">🎬</span> Desenhos</a></li>
    <li><a href="animes.html"><span class="nav-icon">🌸</span> Animes</a></li>
    <li><a href="cadastro.html"><span class="nav-icon">📋</span> Cad. Desenhos</a></li>
    <li><a href="cadastro-animes.html"><span class="nav-icon">📋</span> Cad. Animes</a></li>
    <li><a href="desenhos.html"><span class="nav-icon">▶️</span> Eps. Desenhos</a></li>
    <li><a href="anime-episodios.html"><span class="nav-icon">▶️</span> Eps. Animes</a></li>
    <li><a href="mangas.html"><span class="nav-icon">📖</span> Mangás</a></li>
    <li><a href="agradecimento.html"><span class="nav-icon">💖</span> Agradecimento</a></li>
  </ul>
  <button class="navbar-burger" id="navBurger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<main class="container">
  <div class="page-header">
    <h1>📖 Mangás</h1>
    <p>Sua coleção de links de download de mangás</p>
  </div>

  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="🔍  Pesquisar mangá..." />
    <select id="filterGenero">
      <option value="">Todos os gêneros</option>
    </select>
    <button class="btn btn-accent" id="addMangaBtn">✚ Adicionar Mangá</button>
  </div>

  <div id="mangaList" class="manga-list"></div>
  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="empty-icon">📭</div>
    <p>Nenhum mangá adicionado ainda. Clique em <strong>Adicionar Mangá</strong>.</p>
  </div>
</main>

<!-- MODAL ADD/EDIT -->
<div class="modal-overlay" id="mangaModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="mangaFormTitle">Adicionar Mangá</h2>
      <button class="modal-close" id="mangaClose">✕</button>
    </div>
    <form id="mangaForm" novalidate>
      <input type="hidden" id="mangaId" />
      <div class="form-group">
        <label for="mangaNome">Título do Mangá *</label>
        <input id="mangaNome" class="form-control" type="text" placeholder="Ex: One Piece" required />
      </div>
      <div class="form-group">
        <label for="mangaAutor">Autor</label>
        <input id="mangaAutor" class="form-control" type="text" placeholder="Ex: Eiichiro Oda" />
      </div>
      <div class="form-group">
        <label for="mangaGenero">Gênero</label>
        <input id="mangaGenero" class="form-control" type="text" placeholder="Ex: Ação, Aventura" />
      </div>
      <div class="form-group">
        <label for="mangaLink">Link de Download *</label>
        <input id="mangaLink" class="form-control" type="url" placeholder="https://..." required />
      </div>
      <div class="form-group">
        <label for="mangaNota">Observações</label>
        <textarea id="mangaNota" class="form-control" rows="3" placeholder="Volume/capítulo, qualidade, etc."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="mangaCancelBtn">Cancelar</button>
        <button type="submit" class="btn btn-accent" id="mangaSaveBtn">💾 Salvar</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>
<script src="js/db.js"></script>
<script src="js/mangas.js"></script>
</body>
</html>
